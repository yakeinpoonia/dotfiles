[Settings]
language = en
backend = awww
folder = ~/yakein/my_wallpaper_collection
monitors = All
wallpaper = ~/yakein/my_wallpaper_collection/wallhaven-21deem_1920x1080.png
show_path_in_tooltip = True
fill = fill
sort = name
color = #ffffff
subfolders = False
all_subfolders = False
show_hidden = False
show_gifs_only = False
zen_mode = False
post_command = matugen --show-colors -t scheme-fidelity image --source-color-index 0 $wallpaper && killall waypaper
number_of_columns = 3
swww_transition_type = any
swww_transition_step = 63
swww_transition_angle = 0
swww_transition_duration = 2
swww_transition_fps = 60
mpvpaper_sound = False
mpvpaper_options = 
use_xdg_state = False
stylesheet = /home/yakein/.config/waypaper/style.css
keybindings = ~/.config/waypaper/keybindings.ini

